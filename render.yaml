databases:
  - name: talentnation-db
    databaseName: talentnation
    user: talentnation
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []

services:
  - type: web
    name: talentnation-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: talentnation-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://alentnation.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: alentation
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://alentnation-api.onrender.com
