services:
  # PostgreSQL Database (using Render's managed PostgreSQL)
  - type: web
    name: talentnation-db
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.db
    envVars:
      - key: POSTGRES_USER
        value: talentnation
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: talentnation
      - key: PGDATA
        value: /var/lib/postgresql/data/pgdata
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Backend API
  - type: web
    name: talentnation-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromService:
          name: talentnation-db
          type: web
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://talentnation-web.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: HYPERPAY_ENTITY_ID
        sync: false
      - key: HYPERPAY_ACCESS_TOKEN
        sync: false
      - key: HYPERPAY_BASE_URL
        value: https://test.oppwa.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health

  # Web Frontend (Static Site)
  - type: web
    name: talentnation-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://talentnation-api.onrender.com

# Environment variable groups
envVarGroups:
  - name: talentnation-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
